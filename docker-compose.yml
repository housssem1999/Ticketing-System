version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing -d ticketing"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ticketing_pg_data:/var/lib/postgresql/data

volumes:
  ticketing_pg_data:
